name: ShelfWise Keep-Alive Ping
# Pings the ShelfWise API every 3 days so Supabase never auto-pauses the DB.
# The `/api/keepalive` endpoint bumps a row in the `keepalive` table (counts as activity).
# Runs at 00:15 UTC every 3rd day. Also can be triggered manually from Actions tab.

on:
  schedule:
    - cron: '15 0 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the keep-alive endpoint
        env:
          BASE_URL: ${{ secrets.SHELFWISE_URL || 'https://shelfwise-beige.vercel.app' }}
        run: |
          echo "Pinging $BASE_URL/api/keepalive"
          curl -sSf "$BASE_URL/api/keepalive" -o /dev/null -w "HTTP %{http_code}\n"
